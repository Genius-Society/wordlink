name: auto-sync

on:
  push:
    branches:
      - main

  workflow_dispatch: # 允许手动触发

permissions:
  contents: read

jobs:
  sync-file:
    runs-on: ubuntu-latest
    steps:
      # Step 1: 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v5
      # Step 2: 下载文件并存储到仓库目录
      - name: Sync Files to ModelScope
        env:
          TOKEN: ${{ secrets.MS_TOKEN }}
          NAME: ${{ secrets.GIT_NAME }}
          EMAIL: ${{ secrets.GIT_EMAIL }}
        run: |
          mv -f ./.github/restart.py ../
          git clone https://oauth2:$TOKEN@www.modelscope.cn/studios/Genius-Society/wordlink.git ../ms_repo
          rm -rf ./.git* ./*.py ./*.txt ./LICENSE ./README.md
          cp -rf ../ms_repo/.git ./
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files are different, committing changes..."
            git config --global user.name "$NAME"
            git config --global user.email "$EMAIL"
            git add .
            git commit -m "Auto sync at $(date +%Y-%m-%d)"
            git push
            pip install modelscope==1.37.1
            python ../restart.py --token $TOKEN
          else
            echo "Files are the same, no changes."
          fi
