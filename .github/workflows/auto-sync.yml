name: auto-sync

on:
  push:
    branches:
      - main

  workflow_dispatch: # 允许手动触发

permissions:
  contents: read

jobs:
  sync-file:
    runs-on: ubuntu-latest
    steps:
      # Step 0: 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v5
      # Step 1: 配置 Git
      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.GIT_NAME }}"
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
      # Step 2: 下载文件并存储到仓库目录
      - name: Sync Files to ModelScope
        env:
          TOKEN: ${{ secrets.MS_TOKEN }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          git clone https://oauth2:$TOKEN@www.modelscope.cn/studios/Genius-Society/wordlink.git ../ms_repo
          rm -rf ./.git* ./*.py ./*.txt ./LICENSE ./README.md
          cp -rf ../ms_repo/.git ./
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files are different, committing changes..."
            git add .
            git commit -m "Auto sync at $(date +%Y-%m-%d)"
            git push
            wget --header="Authorization: token $GIT_TOKEN" $BASE_URL/restart.py
            pip install modelscope
            python ./restart.py --token $MS_TOKEN
          else
            echo "Files are the same, no changes."
          fi
